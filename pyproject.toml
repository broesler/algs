[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "algs"
version = "0.0.1"
description = "Fundamental CS Algorithms based on the book 'Algorithms' by Sedgewick and Wayne."
readme = "README.rst"
requires-python = ">=3.9"
license = "MIT"
license-files = ["LICENSE.txt"]

authors = [
  { name = "Bernard Roesler", email = "bernard.roesler@gmail.com" }
]

dependencies = [
  "matplotlib>=3.5",
  "numpy>=1.22",
  "pandas>=1.4",
  "scipy>=1.8",
  "seaborn>=0.11",
  "tqdm>=4.64",
]

[project.optional-dependencies]
dev = [
  "pytest",
  "pytest-env",
]

[tool.pytest.ini_options]
env = [
    "PYTHONHASHSEED=0",
]

[tool.setuptools]
packages = ["algs"]
